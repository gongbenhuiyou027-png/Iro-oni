<style>
  :root{
    --bg:#1c1a20;
    --panel:#26232c;
    --ink:#f2eff5;
    --sub:#9a93a6;
    --accent:#e8b04b;
    --danger:#e85a5a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    transition:background .6s ease;
  }
  .app{width:min(92vw,440px);text-align:center;}

  .brand{
    font-size:13px;letter-spacing:.5em;color:var(--sub);
    text-transform:uppercase;margin-bottom:8px;
  }
  h1{
    font-size:clamp(44px,12vw,58px);
    font-weight:900;letter-spacing:.08em;line-height:1.1;
  }
  h1 .oni{color:var(--accent);transition:color .4s;}
  .btn{
    display:inline-block;border:none;cursor:pointer;
    font:inherit;font-weight:800;font-size:18px;letter-spacing:.15em;
    color:#141217;background:var(--accent);
    padding:16px 48px;border-radius:999px;
    transition:transform .15s,background .4s,box-shadow .3s;
    box-shadow:0 6px 24px color-mix(in srgb,var(--accent) 35%,transparent);
  }
  .btn:hover{transform:translateY(-2px);}
  .btn:active{transform:scale(.96);}
  .btn.ghost{
    background:transparent;color:var(--ink);
    border:1.5px solid #47424f;box-shadow:none;
  }
  .screen{display:none;animation:fadein .35s ease;}
  .screen.active{display:block;}
  @keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* ---------- タイトル ---------- */
  .lead{color:var(--sub);font-size:15px;line-height:1.9;margin:20px 0 32px;}
  .lead b{color:var(--ink);}
  .bestline{margin-top:20px;font-size:13px;color:var(--sub);letter-spacing:.1em;}
  .bestline b{color:var(--accent);font-size:16px;}

  /* ---------- ゲーム ---------- */
  .hud{
    display:flex;justify-content:space-between;align-items:flex-end;
    margin-bottom:14px;
  }
  .hud .cell{text-align:left;}
  .hud .cell:last-child{text-align:right;}
  .hud .label{font-size:10px;letter-spacing:.25em;color:var(--sub);}
  .hud .val{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;}
  .hud .val.combo{color:var(--accent);transition:color .4s;}

  .timerbar{
    height:6px;border-radius:999px;background:#333039;
    overflow:hidden;margin-bottom:18px;
  }
  .timerbar i{
    display:block;height:100%;width:100%;
    background:var(--accent);border-radius:999px;
    transition:background .4s;
    transform-origin:left;
  }

  #grid{
    display:grid;gap:8px;
    aspect-ratio:1;
    touch-action:manipulation;
  }
  #grid button{
    border:none;border-radius:14px;cursor:pointer;
    transition:filter .1s;
    outline:none;
  }
  #grid button:active{filter:brightness(1.08);}
  #grid button.hit-outline{
    box-shadow:0 0 0 3px var(--ink), 0 0 0 6px color-mix(in srgb,var(--ink) 30%,transparent);
  }
  .reveal-msg{
    margin-top:4px;font-size:14px;color:var(--sub);
    letter-spacing:.15em;min-height:20px;
  }
  .shake{animation:shake .3s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  /* ---------- リザルト ---------- */
  .dev-label{font-size:12px;letter-spacing:.3em;color:var(--sub);margin-bottom:4px;}
  .dev-num{
    font-size:clamp(72px,22vw,96px);font-weight:900;
    color:var(--accent);line-height:1;
    font-variant-numeric:tabular-nums;transition:color .4s;
  }
  .title-name{
    display:inline-block;margin:10px 0 24px;
    font-size:20px;font-weight:800;letter-spacing:.2em;
    border:1.5px solid var(--accent);border-radius:999px;
    padding:8px 26px;color:var(--accent);transition:all .4s;
  }
  .stats{
    display:flex;justify-content:center;gap:28px;
    margin-bottom:30px;font-variant-numeric:tabular-nums;
  }
  .stats .label{font-size:10px;letter-spacing:.25em;color:var(--sub);}
  .stats .val{font-size:22px;font-weight:800;}
  .btncol{display:flex;flex-direction:column;gap:12px;align-items:center;}

  /* ---------- ランキング ---------- */
  .rank-list{
    list-style:none;text-align:left;
    max-height:52vh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    margin-top:6px;
  }
  .rank-list li{
    display:flex;align-items:center;gap:14px;
    padding:12px 14px;border-radius:14px;
    background:var(--panel);margin-bottom:8px;
    font-variant-numeric:tabular-nums;
    transition:background .4s;
  }
  .rank-list li.me{
    box-shadow:0 0 0 1.5px var(--accent);
    background:color-mix(in srgb,var(--accent) 12%,var(--panel));
  }
  .rank-list .pos{
    font-size:18px;font-weight:900;color:var(--sub);
    width:28px;text-align:center;flex:none;
  }
  .rank-list li:nth-child(1) .pos{color:var(--accent);}
  .rank-list li:nth-child(2) .pos,
  .rank-list li:nth-child(3) .pos{color:var(--ink);}
  .rank-list .rmain{flex:1;min-width:0;}
  .rank-list .rscore{font-size:19px;font-weight:900;}
  .rank-list .rmeta{font-size:11px;color:var(--sub);letter-spacing:.05em;margin-top:2px;}
  .rank-list .rdev{
    flex:none;text-align:right;
    font-size:22px;font-weight:900;color:var(--accent);
    transition:color .4s;
  }
  .rank-list .rdev small{display:block;font-size:9px;letter-spacing:.2em;color:var(--sub);}
  .rank-empty{color:var(--sub);font-size:15px;line-height:1.9;margin:34px 0 6px;}
  .rank-banner{
    margin-bottom:18px;font-size:14px;font-weight:800;letter-spacing:.12em;
    color:var(--accent);transition:color .4s;
  }
  .rank-banner b{font-size:20px;}

  /* ---------- 世界ランキング ---------- */
  .rtabs{
    display:flex;justify-content:center;gap:8px;margin:14px 0 12px;
  }
  .rtabs button{
    border:1.5px solid #47424f;background:transparent;color:var(--sub);
    font:inherit;font-size:13px;font-weight:800;letter-spacing:.15em;
    padding:8px 22px;border-radius:999px;cursor:pointer;
    transition:all .25s;
  }
  .rtabs button.on{
    border-color:var(--accent);color:var(--accent);
    background:color-mix(in srgb,var(--accent) 10%,transparent);
  }
  .rank-loading{color:var(--sub);font-size:14px;letter-spacing:.15em;margin:34px 0 6px;}
  .gsubmit{
    display:flex;flex-direction:column;gap:10px;align-items:center;
    margin-bottom:22px;
  }
  .gsubmit input{
    width:min(100%,260px);text-align:center;
    font:inherit;font-size:15px;font-weight:700;color:var(--ink);
    background:var(--panel);border:1.5px solid #47424f;border-radius:999px;
    padding:11px 18px;outline:none;transition:border-color .25s;
  }
  .gsubmit input:focus{border-color:var(--accent);}
  .btn.gbtn{font-size:15px;padding:12px 34px;}
  .btn.gbtn:disabled{opacity:.45;cursor:default;transform:none;}
  .gmsg{
    min-height:18px;font-size:13px;font-weight:800;
    letter-spacing:.1em;color:var(--accent);transition:color .4s;
  }
  .gmsg.err{color:var(--danger);}

  #toast{
    position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#141217;font-size:13px;font-weight:700;
    padding:10px 22px;border-radius:999px;opacity:0;
    transition:all .3s;pointer-events:none;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- フィーバー ---------- */
  body.fever{background:#121014;}
  .gridwrap{position:relative;}
  #grid{transition:box-shadow .25s;border-radius:20px;}
  body.fever #grid{
    box-shadow:0 0 0 2px rgba(255,255,255,.9), 0 0 40px rgba(255,255,255,.18);
  }
  body.fever .timerbar i{background:#fff;}
  body.fever .hud .val.combo{color:#fff;}
  .fever-slot{height:36px;display:flex;align-items:center;justify-content:center;margin-top:12px;}
  .fever-tag{
    display:none;flex-direction:column;align-items:center;gap:6px;
  }
  body.fever .fever-tag{display:flex;animation:tagin .25s ease;}
  @keyframes tagin{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  .fever-tag .ftext{
    color:#fff;font-size:13px;font-weight:900;
    letter-spacing:.55em;text-indent:.55em;
  }
  .fever-tag .fbar{
    width:120px;height:2px;background:rgba(255,255,255,.2);overflow:hidden;
  }
  .fever-tag .fbar i{
    display:block;height:100%;background:#fff;transform-origin:left;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>
</head>

  <!-- ランキング画面 -->
  <section class="screen" id="scr-ranking">

<script>
  // ★ 世界ランキング設定（SUPABASE_SETUP.md参照）
  // anonキーは公開前提のキー（RLSでスコアの登録・閲覧のみ許可）。
  // 空にすると世界ランキングは非表示になり、ローカルランキングのみ動作する。
  window.IROONI_SUPABASE = {
    url: 'https://uiqjvejmsrxocggoiddv.supabase.co',
    anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpcWp2ZWptc3J4b2NnZ29pZGR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMzA0NTcsImV4cCI6MjA5OTYwNjQ1N30.0AVvMa7xQXXAXfgRtavFGEyk-sBRBeUyLrbA-knhIYw',
  };
</script>
<script>
(() => {
  const $ = id => document.getElementById(id);
  const GAME_SEC = 30;
  let best = Number(localStorage.getItem('irooni_best') || 0);

  /* ----- ランキング（ローカル保存・トップ10） ----- */
  const RANK_KEY = 'irooni_ranking', RANK_MAX = 10;
  function loadRanking(){
    try{
      const arr = JSON.parse(localStorage.getItem(RANK_KEY) || '[]');
      return Array.isArray(arr) ? arr : [];
    }catch(e){ return []; }
  }
  // スコアをランキングに登録。ランクイン順位（1始まり）を返す。圏外なら -1。
  function saveRanking(entry){
    const list = loadRanking();
    list.push(entry);
    list.sort((a,b)=> b.score - a.score);
    const trimmed = list.slice(0, RANK_MAX);
    localStorage.setItem(RANK_KEY, JSON.stringify(trimmed));
    const pos = trimmed.indexOf(entry);
    return pos === -1 ? -1 : pos + 1;
  }
  function fmtDate(ts){
    const d = new Date(ts);
    const p = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())}`;
  }
  function renderRanking(highlightTs){
    const list = loadRanking();
    const ol = $('rank-list'), empty = $('rank-empty');
    ol.innerHTML = '';
    if(list.length === 0){
      empty.hidden = false;
      ol.hidden = true;
      return;
    }
    empty.hidden = true;
    ol.hidden = false;
    list.forEach((e, i) => {
      const li = document.createElement('li');
      if(highlightTs && e.ts === highlightTs) li.classList.add('me');
      li.innerHTML =
        `<span class="pos">${i+1}</span>`+
        `<span class="rmain">`+
          `<span class="rscore">${Number(e.score).toLocaleString()}</span>`+
          `<span class="rmeta">${e.title} ・ LV${e.level} ・ 最大${e.combo}コンボ ・ ${fmtDate(e.ts)}</span>`+
        `</span>`+
        `<span class="rdev">${e.dev}<small>偏差値</small></span>`;
      ol.appendChild(li);
    });
  }
  window.openRanking = function(from){
    if($('rank-back')) $('rank-back').onclick = () => show(from || 'scr-title');
    if(typeof gtag === 'function') gtag('event', 'view_ranking', {from: from || 'scr-title'});
    $('rtabs').hidden = !sbEnabled();
    rankTab('local');
    show('scr-ranking');
  };

  /* ----- 世界ランキング（Supabase REST） ----- */
  const sbConf = () => window.IROONI_SUPABASE || {};
  const sbEnabled = () => !!(sbConf().url && sbConf().anonKey);
  function sbFetch(path, opts = {}){
    const {url, anonKey} = sbConf();
    return fetch(`${url}/rest/v1/${path}`, {
      ...opts,
      headers:{
        'apikey': anonKey,
        'Authorization': `Bearer ${anonKey}`,
        'Content-Type': 'application/json',
        ...(opts.headers || {}),
      },
    });
  }
  const esc = s => String(s).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  window.rankTab = function(which){
    $('tab-local').classList.toggle('on', which === 'local');
    $('tab-world').classList.toggle('on', which === 'world');
    if(which === 'local'){ renderRanking(state.lastTs); }
    else{ renderWorld(); }
  };

  async function renderWorld(){
    const ol = $('rank-list'), empty = $('rank-empty');
    empty.hidden = true;
    ol.hidden = false;
    ol.innerHTML = '<p class="rank-loading">読み込み中…</p>';
    try{
      const res = await sbFetch(
        'scores?select=name,score,level,combo,dev,title&order=score.desc,created_at.asc&limit=10');
      if(!res.ok) throw new Error(res.status);
      const list = await res.json();
      if(!$('tab-world').classList.contains('on')) return; // 取得中にタブが切り替わった
      ol.innerHTML = '';
      if(list.length === 0){
        ol.hidden = true;
        empty.hidden = false;
        return;
      }
      list.forEach((e, i) => {
        const li = document.createElement('li');
        li.innerHTML =
          `<span class="pos">${i+1}</span>`+
          `<span class="rmain">`+
            `<span class="rscore">${Number(e.score).toLocaleString()}</span>`+
            `<span class="rmeta">${esc(e.name)} ・ ${esc(e.title)} ・ LV${Number(e.level)} ・ 最大${Number(e.combo)}コンボ</span>`+
          `</span>`+
          `<span class="rdev">${Number(e.dev)}<small>偏差値</small></span>`;
        ol.appendChild(li);
      });
    }catch(err){
      if(!$('tab-world').classList.contains('on')) return;
      ol.innerHTML = '<p class="rank-loading">取得できませんでした。通信環境を確認してね。</p>';
    }
  }

  window.submitGlobal = async function(){
    if(!sbEnabled() || state.submitted) return;
    const name = $('gname').value.trim().slice(0, 10);
    const msg = $('gmsg');
    if(!name){
      msg.textContent = 'なまえを入れてね';
      msg.classList.add('err');
      return;
    }
    msg.classList.remove('err');
    msg.textContent = '送信中…';
    $('gsend').disabled = true;
    localStorage.setItem('irooni_name', name);
    const entry = state.lastEntry;
    try{
      const res = await sbFetch('scores', {
        method:'POST',
        body: JSON.stringify({
          name, score: entry.score, level: entry.level,
          combo: entry.combo, dev: entry.dev, title: entry.title,
        }),
      });
      if(!res.ok) throw new Error(res.status);
      state.submitted = true;
      // 自分より上のスコア数から世界順位を出す
      let rankText = '登録しました！';
      try{
        const cr = await sbFetch(`scores?select=id&score=gt.${entry.score}`, {
          method:'HEAD',
          headers:{'Prefer':'count=exact','Range':'0-0'},
        });
        const total = cr.headers.get('content-range');
        if(total && total.includes('/')){
          rankText = `世界${Number(total.split('/')[1]) + 1}位にランクイン！`;
        }
      }catch(e){}
      msg.textContent = rankText;
      if(typeof gtag === 'function') gtag('event', 'submit_global_score', {score: entry.score});
    }catch(err){
      msg.textContent = '送信に失敗しました。もう一度試してね。';
      msg.classList.add('err');
      $('gsend').disabled = false;
    }
  };

  const state = {
    running:false, score:0, combo:0, maxCombo:0, level:1,
    timeLeft:GAME_SEC, answer:-1, lastTick:0, raf:0, shareText:'',
    feverUntil:0, lastTs:0, lastRank:-1, lastEntry:null, submitted:false,
  };

  function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    $(id).classList.add('active');
  }

  /* ----- 色生成 ----- */
  function levelSpec(lv){
    const size = Math.min(2 + Math.floor((lv-1)/4), 5);       // 2x2 → 5x5（緩やかに拡大）
    const diff = 8 + 22 * Math.exp(-(lv-1)/10);               // 色差は緩やかに減衰、下限8で見える範囲を維持
    return {size, diff};
  }
  function hsl(h,s,l){return `hsl(${h} ${s}% ${l}%)`;}

  function buildLevel(){
    const {size, diff} = levelSpec(state.level);
    const h = Math.floor(Math.random()*360);
    const s = 45 + Math.random()*35;
    const l = 38 + Math.random()*26;
    const hueShift = (Math.random()<.5?-1:1) * Math.min(diff*.5, 8);
    const lShift   = (l>55?-1:1) * diff*.55;

    // UIアクセント色を出題色に連動させる（署名演出）
    document.documentElement.style.setProperty('--accent', hsl(h, Math.min(s+15,90), 62));

    const n = size*size;
    state.answer = Math.floor(Math.random()*n);
    const grid = $('grid');
    grid.style.gridTemplateColumns = `repeat(${size},1fr)`;
    grid.innerHTML = '';
    for(let i=0;i<n;i++){
      const b = document.createElement('button');
      b.style.background = (i===state.answer)
        ? hsl(h+hueShift, s, l+lShift)
        : hsl(h, s, l);
      b.addEventListener('pointerdown', ()=>tap(i, b), {passive:true});
      grid.appendChild(b);
    }
  }

  /* ----- フィーバー ----- */
  const FEVER_SEC = 5, FEVER_EVERY = 5;
  function inFever(){ return performance.now() < state.feverUntil; }
  function startFever(){
    state.feverUntil = performance.now() + FEVER_SEC*1000;
    document.body.classList.add('fever');
  }
  function stopFever(){
    state.feverUntil = 0;
    document.body.classList.remove('fever');
  }

  /* ----- 入力 ----- */
  function tap(i, el){
    if(!state.running) return;
    if(i === state.answer){
      state.combo++;
      state.maxCombo = Math.max(state.maxCombo, state.combo);
      let mult = 1 + Math.min(state.combo,10)*0.2;
      if(inFever()) mult *= 2;
      state.score += Math.round(100 * state.level * mult);
      if(state.combo % FEVER_EVERY === 0) startFever();
      state.level++;
      buildLevel();
    }else{
      state.combo = 0;
      stopFever();
      state.timeLeft = Math.max(0, state.timeLeft - 2);
      $('grid').classList.remove('shake');
      void $('grid').offsetWidth;
      $('grid').classList.add('shake');
    }
    paintHud();
  }

  /* ----- HUD ----- */
  function paintHud(){
    $('h-score').textContent = state.score.toLocaleString();
    $('h-combo').textContent = state.combo;
    $('h-time').textContent = state.timeLeft.toFixed(1);
    $('tbar').style.transform = `scaleX(${state.timeLeft/GAME_SEC})`;
  }

  /* ----- ループ ----- */
  function tick(t){
    if(!state.running) return;
    const dt = (t - state.lastTick)/1000;
    state.lastTick = t;
    state.timeLeft = Math.max(0, state.timeLeft - dt);
    if(state.feverUntil){
      if(!inFever()){ stopFever(); }
      else{
        const rem = (state.feverUntil - t) / (FEVER_SEC*1000);
        $('fbar').style.transform = `scaleX(${Math.max(0,rem)})`;
      }
    }
    paintHud();
    if(state.timeLeft <= 0){ endGame(); return; }
    state.raf = requestAnimationFrame(tick);
  }

  /* ----- 開始/終了 ----- */
  window.startGame = function(){
    Object.assign(state,{
      running:true, score:0, combo:0, maxCombo:0, level:1,
      timeLeft:GAME_SEC,
    });
    stopFever();
    $('reveal-msg').textContent = '';
    if(typeof gtag === 'function') gtag('event', 'game_start');
    show('scr-game');
    buildLevel();
    paintHud();
    state.lastTick = performance.now();
    state.raf = requestAnimationFrame(tick);
  };

  function endGame(){
    state.running = false;
    stopFever();
    cancelAnimationFrame(state.raf);

    // 2段階リベール：まず正解を控えめに示し、その後素の状態で見せる
    const btns = $('grid').children;
    if(btns[state.answer]){
      btns[state.answer].classList.add('hit-outline');
      $('reveal-msg').textContent = '正解はここ';
    }
    setTimeout(()=>{
      if(btns[state.answer]) btns[state.answer].classList.remove('hit-outline');
      $('reveal-msg').textContent = '違い、見える？';
    }, 1500);
    setTimeout(showResult, 3000);
  }

  function showResult(){
    // 偏差値：スコアをロジスティックに写像（10万点前後で65〜70、上はさらに遠い）
    const dev = 30 + 55 / (1 + Math.exp(-(state.score - 70000)/32000));
    const d = Math.floor(dev);
    const titles = [
      [83,'色の神'],[79,'人間卒業'],[75,'四色型色覚'],
      [71,'印刷所の目'],[67,'染織職人'],[63,'色彩鑑定士'],
      [59,'デザイナーの卵'],[55,'色感アリ'],[51,'ふつうの人'],
      [47,'昨日寝てない？'],[43,'蛍光灯の下暮らし'],[0,'モノクロ生活'],
    ];
    const title = titles.find(([th])=>d>=th)[1];

    $('dev-num').textContent = d;
    $('title-name').textContent = title;
    $('r-score').textContent = state.score.toLocaleString();
    $('r-lv').textContent = state.level;
    $('r-combo').textContent = state.maxCombo;

    if(state.score > best){
      best = state.score;
      localStorage.setItem('irooni_best', best);
    }
    $('bestval').textContent = best.toLocaleString();
    $('bestval2').textContent = best.toLocaleString();
    $('bestline').hidden = false;

    // ランキング登録
    state.lastTs = Date.now();
    state.lastEntry = {
      ts: state.lastTs, score: state.score, level: state.level,
      combo: state.maxCombo, dev: d, title,
    };
    state.lastRank = saveRanking(state.lastEntry);

    // 世界ランキング投稿フォーム（Supabase設定時のみ）
    state.submitted = false;
    $('gsubmit').hidden = !sbEnabled();
    if(sbEnabled()){
      $('gname').value = localStorage.getItem('irooni_name') || '';
      $('gsend').disabled = false;
      $('gmsg').textContent = '';
      $('gmsg').classList.remove('err');
    }
    const banner = $('rank-banner');
    if(state.lastRank === 1){
      banner.innerHTML = '🏆 自己ベスト更新！ ランキング <b>1</b> 位';
      banner.hidden = false;
    }else if(state.lastRank > 0){
      banner.innerHTML = `ランキング <b>${state.lastRank}</b> 位にランクイン！`;
      banner.hidden = false;
    }else{
      banner.hidden = true;
    }

    if(typeof gtag === 'function') gtag('event', 'game_end', {
      score: state.score,
      level_reached: state.level,
      max_combo: state.maxCombo,
      deviation: d,
      title_name: title,
    });

    state.shareText =
      `イロオニで色感偏差値${d}【${title}】だった！\n`+
      `SCORE ${state.score.toLocaleString()} / LV${state.level} / 最大${state.maxCombo}コンボ\n`+
      `https://gongbenhuiyou027-png.github.io/Iro-oni/\n#イロオニ`;
    show('scr-result');
  }

  window.share = async function(){
    const text = state.shareText;
    if(typeof gtag === 'function') gtag('event', 'share_click');
    if(navigator.share){
      try{ await navigator.share({text}); return; }catch(e){}
    }
    try{
      await navigator.clipboard.writeText(text);
      const t = $('toast');
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),1800);
    }catch(e){}
  };

  // 起動時ベスト表示
  if(best>0){
    $('bestline').hidden = false;
    $('bestval').textContent = best.toLocaleString();
  }
})();
</script>
</body>
</html>
